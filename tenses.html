<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الأزمنة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="tensesTitle">الأزمنة في الإنجليزية</h1>
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-clock"></i> <span id="totalTenses">0</span> <span data-i18n="tenses">زمن</span></div>
                    <div class="quick-stat"><i class="fas fa-bookmark"></i> <span id="savedCount">0</span> <span data-i18n="savedCount">محفوظة</span></div>
                </div>
            </div>
            <button class="filter-chip" id="showSavedBtn"><i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظات</span></button>
        </header>

        <div class="filter-row">
            <button class="filter-chip active" data-level="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-level="beginner" data-i18n="beginner">مبتدئ</button>
            <button class="filter-chip" data-level="intermediate" data-i18n="intermediate">متوسط</button>
            <button class="filter-chip" data-level="advanced" data-i18n="advanced">متقدم</button>
        </div>

        <!-- TENSES GRID -->
        <div class="content-grid" id="tensesGrid"></div>
    </div>

    <!-- TENSE MODAL -->
    <div class="cl-modal" id="tenseModal">
        <div class="modal-container" id="modalContainer"></div>
    </div>

    <script src="tenses-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        let currentLevel = 'all';
        let viewMode = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            applyFilters();
            setupListeners();
        });

        function setupListeners() {
            document.querySelectorAll('.filter-chip[data-level]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    viewMode = 'all';
                    applyFilters();
                });
            });

            document.getElementById('showSavedBtn').addEventListener('click', () => {
                const btn = document.getElementById('showSavedBtn');
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                if (viewMode === 'saved') {
                    viewMode = 'all';
                    document.querySelector('.filter-chip[data-level="all"]').classList.add('active');
                } else {
                    viewMode = 'saved';
                    btn.classList.add('active');
                }
                applyFilters();
            });
        }

        function updateStats() {
            document.getElementById('totalTenses').textContent = TENSES_DATA.length;
            document.getElementById('savedCount').textContent = Core.state.savedTenses.length;
        }

        function applyFilters() {
            let filtered = TENSES_DATA;
            if (viewMode === 'saved') {
                filtered = filtered.filter(t => Core.state.savedTenses.includes(t.id));
            } else if (currentLevel !== 'all') {
                filtered = filtered.filter(t => t.level === currentLevel);
            }
            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('tensesGrid');
            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <i class="fas fa-clock" style="font-size: 3rem; color: var(--text-tertiary); margin-bottom: 1rem;"></i>
                    <p class="text-secondary">لا توجد أزمنة محفوظة حالياً</p>
                </div>`;
                return;
            }

            grid.innerHTML = data.map(t => {
                const isSaved = Core.state.savedTenses.includes(t.id);
                return `
                <div class="cl-card animate-fade" style="padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 class="word-text" style="font-size: 1.25rem;">${t.name}</h3>
                        <span class="quick-stat glass" style="font-size: 0.7rem;">${t.level.toUpperCase()}</span>
                    </div>
                    <p class="text-secondary" style="font-size: 0.9rem; margin-bottom: 1rem;">${t.nameAr}</p>
                    <div class="card-formula">${t.form}</div>
                    <div class="card-actions" style="margin-top: 1.5rem;">
                        <button class="action-btn" onclick="openTense(${t.id})" style="grid-column: 1/-1; background: var(--primary); color: white;">
                            <i class="fas fa-book-open"></i> <span data-i18n="learnMore">تعلّم</span>
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            applyLanguage(currentLanguage);
        }

        function openTense(id) {
            const tns = TENSES_DATA.find(x => x.id === id);
            const isSaved = Core.state.savedTenses.includes(tns.id);
            const container = document.getElementById('modalContainer');

            container.innerHTML = `
                <div class="modal-header">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <button class="settings-close" style="background: var(--bg-secondary); color: var(--text-primary);" onclick="closeTense()"><i class="fas fa-times"></i></button>
                        <h2 class="word-text" style="font-size: 1.5rem;">${tns.name}</h2>
                    </div>
                    <button class="action-btn ${isSaved ? 'active' : ''}" onclick="toggleSave(${tns.id})">
                        <i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}
                    </button>
                </div>
                <div class="animate-fade">
                    <div class="settings-section-title"><i class="fas fa-info-circle"></i> <span data-i18n="rule">شرح</span></div>
                    <div class="modal-translation" style="display:block; padding: 1.5rem; margin-bottom: 2rem;">
                        ${tns.explanation}
                    </div>

                    <div class="settings-section-title"><i class="fas fa-list"></i> <span data-i18n="tenseExamples">أمثلة</span></div>
                    <div class="examples-list" style="margin-bottom: 2rem;">
                        ${tns.examples.map(ex => `
                            <div class="word-example" style="margin-bottom: 1rem;">
                                <p class="en">${ex.positive}</p>
                                <p class="ar">${ex.positiveAr}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="settings-section-title"><i class="fas fa-pencil-alt"></i> <span data-i18n="tenseExercises">تمارين</span></div>
                    <div id="exerciseArea">
                        ${tns.exercises.map((ex, idx) => `
                            <div class="cl-card" style="padding: 1.5rem; margin-bottom: 1rem;">
                                <p style="font-weight: 700; margin-bottom: 1rem;">${idx+1}. ${ex.question}</p>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                                    ${ex.options.map((opt, oIdx) => `
                                        <button class="action-btn" onclick="checkAnswer(${tns.id}, ${idx}, ${oIdx}, this)">${opt}</button>
                                    `).join('')}
                                </div>
                                <div id="feedback-${idx}" style="display:none; margin-top:1rem; padding:0.75rem; border-radius:var(--radius-sm); font-size:0.85rem;"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('tenseModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            applyLanguage(currentLanguage);
        }

        function checkAnswer(tenseId, qIdx, oIdx, btn) {
            const tense = TENSES_DATA.find(t => t.id === tenseId);
            const ex = tense.exercises[qIdx];
            const feedback = document.getElementById(`feedback-${qIdx}`);

            // Disable buttons in this group
            const group = btn.parentElement.querySelectorAll('button');
            group.forEach(b => b.disabled = true);

            feedback.style.display = 'block';
            if (oIdx === ex.correct) {
                btn.style.background = 'var(--success)';
                btn.style.color = 'white';
                feedback.innerHTML = `<i class="fas fa-check-circle"></i> صحيح! ${ex.explanation}`;
                feedback.style.background = 'var(--success-light)';
                feedback.style.color = 'var(--success)';
            } else {
                btn.style.background = 'var(--danger)';
                btn.style.color = 'white';
                group[ex.correct].style.background = 'var(--success)';
                group[ex.correct].style.color = 'white';
                feedback.innerHTML = `<i class="fas fa-times-circle"></i> خطأ. ${ex.explanation}`;
                feedback.style.background = 'var(--danger-light)';
                feedback.style.color = 'var(--danger)';
            }
        }

        function closeTense() {
            document.getElementById('tenseModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function toggleSave(id) {
            const isSaved = Core.state.savedTenses.includes(id);
            Core.updateProgress('savedTenses', id, !isSaved);
            Core.showToast(isSaved ? t('toastUnsaved') : t('toastSaved'), isSaved ? 'warning' : 'success');
            updateStats();
            const btn = document.querySelector('.modal-header .action-btn');
            if (btn) {
                btn.classList.toggle('active', !isSaved);
                btn.innerHTML = `<i class="fas fa-bookmark"></i> ${!isSaved ? t('unsave') : t('save')}`;
            }
            applyFilters();
        }
    </script>
</body>
</html>
