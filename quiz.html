<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الاختبارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="quizTitle">اختبر مستواك</h1>
                <p class="text-secondary" data-i18n="quizSub">ستة مستويات CEFR من A1 إلى C2</p>
            </div>
            <div class="quick-stats">
                <div class="quick-stat"><i class="fas fa-tasks"></i> <span id="completedCount">0</span> <span data-i18n="completed">مكتمل</span></div>
                <div class="quick-stat"><i class="fas fa-star" style="color: var(--warning);"></i> <span data-i18n="bestScore">أفضل نتيجة</span>: <b id="bestScorePct">0%</b></div>
            </div>
        </header>

        <div class="filter-row">
            <button class="filter-chip active" data-level="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-level="a1">A1</button>
            <button class="filter-chip" data-level="a2">A2</button>
            <button class="filter-chip" data-level="b1">B1</button>
            <button class="filter-chip" data-level="b2">B2</button>
            <button class="filter-chip" data-level="c1">C1</button>
            <button class="filter-chip" data-level="c2">C2</button>
        </div>

        <!-- QUIZZES GRID -->
        <div class="content-grid" id="quizzesGrid"></div>
    </div>

    <!-- QUIZ MODAL -->
    <div class="cl-modal" id="quizModal">
        <div class="modal-container" id="quizModalContainer"></div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let currentFilter = 'all';
        let activeQuiz = null;
        let currentQuestionIndex = 0;
        let answers = {};
        let quizTimer = null;
        let timeLeft = 0;

        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            setupListeners();
            renderQuizzes();
        });

        function setupListeners() {
            document.querySelectorAll('.filter-chip[data-level]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.level;
                    renderQuizzes();
                });
            });
        }

        function updateStats() {
            document.getElementById('completedCount').textContent = Core.state.completedQuizzes.length;
            let best = 0;
            QUIZZES.forEach(q => {
                const s = localStorage.getItem(`cefr_score_${q.id}`);
                if (s && parseInt(s) > best) best = parseInt(s);
            });
            document.getElementById('bestScorePct').textContent = best + '%';
        }

        function renderQuizzes() {
            const grid = document.getElementById('quizzesGrid');
            const filtered = currentFilter === 'all' ? QUIZZES : QUIZZES.filter(q => q.level === currentFilter);

            grid.innerHTML = filtered.map(q => {
                const isCompleted = Core.state.completedQuizzes.includes(q.id);
                const score = localStorage.getItem(`cefr_score_${q.id}`) || 0;

                return `
                <div class="cl-card animate-fade" style="padding: 0; overflow: hidden;">
                    <div style="background: var(--gradient); padding: 2rem; color: white; text-align: center;">
                        <div style="font-size: 2.5rem; margin-bottom: 1rem;"><i class="fas ${q.icon}"></i></div>
                        <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">${q.title}</h3>
                        <p style="font-size: 0.85rem; opacity: 0.9;">${q.desc}</p>
                    </div>
                    <div style="padding: 1.5rem;">
                        <div class="progress-label" style="margin-bottom: 0.5rem;">
                            <span>الإنجاز</span>
                            <span>${score}%</span>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${score}%;"></div></div>
                        <div style="margin-top: 1.5rem;">
                            <button class="action-btn" style="width: 100%; background: var(--primary); color: white;" onclick="startQuiz(${q.id})">
                                <i class="fas fa-${isCompleted ? 'redo' : 'play'}"></i>
                                <span data-i18n="${isCompleted ? 'redo' : 'start'}">${isCompleted ? 'إعادة' : 'ابدأ'}</span>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            applyLanguage(currentLanguage);
        }

        function startQuiz(id) {
            activeQuiz = QUIZZES.find(q => q.id === id);
            const rawQuestions = QUIZ_DATA[activeQuiz.level];
            activeQuiz.questions = [...rawQuestions.grammar, ...rawQuestions.vocabulary, ...rawQuestions.reading, ...rawQuestions.use_of_english];

            currentQuestionIndex = 0;
            answers = {};

            document.getElementById('quizModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            renderQuestion();
        }

        function renderQuestion() {
            const q = activeQuiz.questions[currentQuestionIndex];
            const container = document.getElementById('quizModalContainer');
            const progress = ((currentQuestionIndex) / activeQuiz.questions.length) * 100;

            let optionsHtml = '';
            if (q.type === 'mcq') {
                optionsHtml = q.options.map((opt, i) => `
                    <div class="option-item" onclick="handleAnswer(${i})">
                        <span class="quick-stat glass" style="width: 30px; height: 30px; justify-content: center;">${String.fromCharCode(65 + i)}</span>
                        <span>${opt}</span>
                    </div>
                `).join('');
            } else if (q.type === 'tf') {
                optionsHtml = `
                    <div class="option-item" onclick="handleAnswer(true)">
                        <i class="fas fa-check" style="color: var(--success);"></i> <span>صحيح</span>
                    </div>
                    <div class="option-item" onclick="handleAnswer(false)">
                        <i class="fas fa-times" style="color: var(--danger);"></i> <span>خطأ</span>
                    </div>
                `;
            } else if (q.type === 'fill') {
                optionsHtml = `
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="fillInput" class="search-input" placeholder="اكتب الإجابة هنا..." style="flex: 1;">
                        <button class="action-btn" style="background: var(--primary); color: white;" onclick="handleAnswer(document.getElementById('fillInput').value)">تحقق</button>
                    </div>
                    ${q.hint ? `<p class="text-tertiary" style="font-size: 0.8rem; margin-top: 0.5rem;"><i class="fas fa-lightbulb"></i> تلميح: ${q.hint}</p>` : ''}
                `;
            }

            container.innerHTML = `
                <div class="modal-header">
                    <button class="settings-close" style="background: var(--bg-secondary); color: var(--text-primary);" onclick="closeQuiz()"><i class="fas fa-times"></i></button>
                    <div style="text-align: center;">
                        <p class="text-tertiary" style="font-size: 0.75rem; font-weight: 800;">سؤال ${currentQuestionIndex + 1} من ${activeQuiz.questions.length}</p>
                        <div class="progress-bar-bg" style="width: 100px; height: 6px; margin-top: 4px;"><div class="progress-bar-fill" style="width: ${progress}%;"></div></div>
                    </div>
                    <div class="quick-stat glass"><i class="fas fa-clock"></i> <span id="timerText">${activeQuiz.time}</span></div>
                </div>
                <div class="animate-fade">
                    ${q.passage ? `<div class="word-example" style="margin-bottom: 1.5rem; font-style: italic; opacity: 0.8;">${q.passage}</div>` : ''}
                    <div class="question-box">
                        <h2 style="font-size: 1.25rem; font-weight: 700; line-height: 1.5;">${q.question}</h2>
                    </div>
                    <div class="options-list">
                        ${optionsHtml}
                    </div>
                    <div id="feedback" style="display: none; margin-top: 2rem; padding: 1.5rem; border-radius: var(--radius-md); border-right: 4px solid var(--primary); background: var(--bg-secondary);">
                        <h4 id="feedbackTitle" style="margin-bottom: 0.5rem;"></h4>
                        <p id="feedbackText" class="text-secondary"></p>
                        <button class="action-btn" style="margin-top: 1.5rem; width: 100%; background: var(--primary); color: white;" onclick="nextQuestion()">
                            التالي <i class="fas fa-arrow-left"></i>
                        </button>
                    </div>
                </div>
            `;

            resetTimer();
        }

        function handleAnswer(val) {
            const q = activeQuiz.questions[currentQuestionIndex];
            let isCorrect = false;

            if (q.type === 'fill') {
                isCorrect = val.toLowerCase().trim() === q.answer.toLowerCase().trim();
            } else {
                isCorrect = val === q.correct;
            }

            answers[currentQuestionIndex] = isCorrect;

            const feedback = document.getElementById('feedback');
            const title = document.getElementById('feedbackTitle');
            const text = document.getElementById('feedbackText');

            feedback.style.display = 'block';
            if (isCorrect) {
                feedback.style.borderRightColor = 'var(--success)';
                title.innerHTML = '<i class="fas fa-check-circle"></i> إجابة صحيحة!';
                title.style.color = 'var(--success)';
            } else {
                feedback.style.borderRightColor = 'var(--danger)';
                title.innerHTML = '<i class="fas fa-times-circle"></i> إجابة خاطئة';
                title.style.color = 'var(--danger)';
            }
            text.textContent = q.explanation;

            // Disable interactions
            document.querySelectorAll('.option-item').forEach(el => el.style.pointerEvents = 'none');
            if (document.getElementById('fillInput')) document.getElementById('fillInput').disabled = true;

            clearInterval(quizTimer);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < activeQuiz.questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const correctCount = Object.values(answers).filter(v => v).length;
            const total = activeQuiz.questions.length;
            const pct = Math.round((correctCount / total) * 100);

            // Save Progress
            if (pct >= 60) {
                Core.updateProgress('completedQuizzes', activeQuiz.id);
            }
            const prevScore = parseInt(localStorage.getItem(`cefr_score_${activeQuiz.id}`)) || 0;
            if (pct > prevScore) localStorage.setItem(`cefr_score_${activeQuiz.id}`, pct);

            const container = document.getElementById('quizModalContainer');
            container.innerHTML = `
                <div class="results-wrap animate-fade" style="padding: 3rem 1.5rem;">
                    <div class="result-circle">
                        <span class="result-pct">${pct}</span>
                        <span class="result-sign">%</span>
                    </div>
                    <h2 class="result-title" style="margin-top: 2rem;">${pct >= 60 ? t('passed') : t('needsReview')}</h2>
                    <p class="text-secondary" style="margin-bottom: 2.5rem;">لقد أجبت على ${correctCount} من أصل ${total} أسئلة بشكل صحيح.</p>

                    <div class="card-actions" style="grid-template-columns: 1fr;">
                        <button class="action-btn" style="background: var(--primary); color: white;" onclick="closeQuiz()">العودة للقائمة</button>
                        <button class="action-btn" style="background: var(--bg-secondary);" onclick="startQuiz(${activeQuiz.id})">إعادة المحاولة</button>
                    </div>
                </div>
            `;

            updateStats();
            renderQuizzes();
        }

        function resetTimer() {
            clearInterval(quizTimer);
            timeLeft = activeQuiz.time;
            const el = document.getElementById('timerText');
            quizTimer = setInterval(() => {
                timeLeft--;
                el.textContent = timeLeft;
                if (timeLeft <= 0) {
                    handleAnswer(null); // Timeout
                }
            }, 1000);
        }

        function closeQuiz() {
            document.getElementById('quizModal').classList.remove('active');
            document.body.style.overflow = '';
            clearInterval(quizTimer);
        }
    </script>
</body>
</html>
