<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | تحميل التطبيق</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header" style="text-align: center; display: block; margin-bottom: 3rem;">
            <h1 data-i18n="page-title">حمّل تطبيق CineLingua</h1>
            <p class="text-secondary" data-i18n="page-sub" style="margin-top: 0.5rem;">ثبّت التطبيق واستمتع بالتعلم في أي وقت — حتى بدون إنترنت</p>
        </div>

        <div class="cl-card animate-fade" style="padding: 2.5rem; text-align: center; max-width: 600px; margin: 0 auto 2rem;">
            <div style="width: 100px; height: 100px; background: white; border-radius: var(--radius-lg); padding: 10px; margin: 0 auto 1.5rem; box-shadow: var(--shadow-md); border: 2px solid var(--border);">
                <img src="https://i.postimg.cc/J4xdc62M/20260305-233826.png" style="width: 100%; height: 100%; object-fit: contain; border-radius: var(--radius-sm);">
            </div>
            <h3 data-i18n="card-title" style="font-weight: 800; margin-bottom: 0.5rem;">تثبيت مباشر من المتصفح</h3>
            <p class="text-secondary" data-i18n="card-sub" style="font-size: 0.9rem; margin-bottom: 2rem;">أسرع وأسهل طريقة — بدون متجر تطبيقات</p>

            <button class="btn btn-white" id="installBtn" style="width: 100%; background: var(--success); color: white; border: none; padding: 1.25rem; font-size: 1.1rem; box-shadow: 0 10px 20px var(--success-light);" onclick="handleInstall()">
                <i class="fas fa-download"></i> <span data-i18n="install-btn-txt">تثبيت التطبيق</span>
            </button>

            <div style="margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1rem; text-align: right;">
                <div style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: var(--text-secondary);">
                    <i class="fas fa-check-circle" style="color: var(--success);"></i> <span data-i18n="f1">يعمل بدون إنترنت بعد التثبيت</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: var(--text-secondary);">
                    <i class="fas fa-check-circle" style="color: var(--success);"></i> <span data-i18n="f5">إشعارات يومية تساعدك على الاستمرار</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: var(--text-secondary);">
                    <i class="fas fa-check-circle" style="color: var(--success);"></i> <span data-i18n="f3">مساحة تخزين أقل من التطبيقات العادية</span>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" class="btn btn-outline-white" style="color: var(--primary); border-color: var(--primary);">
                <i class="fas fa-arrow-right"></i> <span data-i18n="back">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <script src="translation.js"></script>
    <script src="core.js"></script>
    <script>
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
        });

        async function handleInstall() {
            if (!deferredPrompt) {
                Core.showToast(currentLanguage === 'ar' ? 'افتح قائمة المتصفح ثم اضغط تثبيت' : 'Open browser menu and tap Install', 'info');
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                const btn = document.getElementById('installBtn');
                btn.innerHTML = '<i class="fas fa-check"></i> تم التثبيت';
                btn.style.background = 'var(--bg-secondary)';
                btn.style.color = 'var(--text-tertiary)';
            }
            deferredPrompt = null;
        }
    </script>
</body>
</html>
