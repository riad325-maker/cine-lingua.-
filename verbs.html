<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | تصاريف الأفعال</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="verbsTitle">تصاريف الأفعال</h1>
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-language"></i> <span id="totalVerbs">0</span> <span data-i18n="verbs">فعل</span></div>
                    <div class="quick-stat"><i class="fas fa-check-circle"></i> <span id="learnedVerbsCount">0</span> <span data-i18n="completed">مكتملة</span></div>
                    <div class="quick-stat"><i class="fas fa-bookmark"></i> <span id="savedVerbsCount">0</span> <span data-i18n="saved">محفوظة</span></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="filter-chip" id="showSavedBtn"><i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظات</span></button>
                <button class="filter-chip" id="showLearnedBtn"><i class="fas fa-check-circle"></i> <span data-i18n="completed">المكتملة</span></button>
            </div>
        </header>

        <!-- SEARCH & FILTERS -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search" placeholder="ابحث عن فعل...">
        </div>

        <div class="filter-row">
            <button class="filter-chip active" data-type="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-type="irregular" data-i18n="irregular">شاذة</button>
            <button class="filter-chip" data-type="regular" data-i18n="regular">منتظمة</button>
        </div>

        <!-- GRID -->
        <div class="content-grid" id="verbsGrid"></div>

        <!-- PAGINATION -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="verbs-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        let currentType = 'all';
        let searchQuery = '';
        let currentPage = 1;
        const itemsPerPage = 24;
        let viewMode = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            initVerbs();
            setupVerbsListeners();
        });

        function initVerbs() {
            updateVerbsStats();
            applyVerbsFilters();
        }

        function setupVerbsListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1;
                applyVerbsFilters();
            });

            document.querySelectorAll('.filter-chip[data-type]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.dataset.type;
                    viewMode = 'all';
                    currentPage = 1;
                    applyVerbsFilters();
                });
            });

            document.getElementById('showSavedBtn').addEventListener('click', () => {
                toggleVerbsViewMode('saved', document.getElementById('showSavedBtn'));
            });

            document.getElementById('showLearnedBtn').addEventListener('click', () => {
                toggleVerbsViewMode('learned', document.getElementById('showLearnedBtn'));
            });
        }

        function toggleVerbsViewMode(mode, btn) {
            document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
            if (viewMode === mode) {
                viewMode = 'all';
                document.querySelector('.filter-chip[data-type="all"]').classList.add('active');
            } else {
                viewMode = mode;
                btn.classList.add('active');
            }
            currentPage = 1;
            applyVerbsFilters();
        }

        function updateVerbsStats() {
            document.getElementById('totalVerbs').textContent = VERBS_DATA.length;
            document.getElementById('learnedVerbsCount').textContent = Core.state.learnedVerbs.length;
            document.getElementById('savedVerbsCount').textContent = Core.state.savedVerbs.length;
        }

        function applyVerbsFilters() {
            let filtered = VERBS_DATA;
            if (viewMode === 'saved') {
                filtered = filtered.filter(v => Core.state.savedVerbs.includes(v.id));
            } else if (viewMode === 'learned') {
                filtered = filtered.filter(v => Core.state.learnedVerbs.includes(v.id));
            } else if (currentType !== 'all') {
                filtered = filtered.filter(v => v.type === currentType);
            }

            if (searchQuery) {
                filtered = filtered.filter(v => v.v1.toLowerCase().includes(searchQuery) || v.ar.includes(searchQuery));
            }

            renderVerbsGrid(filtered);
        }

        function renderVerbsGrid(data) {
            const grid = document.getElementById('verbsGrid');
            const totalPages = Math.ceil(data.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageData = data.slice(start, start + itemsPerPage);

            if (pageData.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <i class="fas fa-search" style="font-size: 3rem; color: var(--text-tertiary); margin-bottom: 1rem;"></i>
                    <p class="text-secondary">لا توجد أفعال مطابقة</p>
                </div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            grid.innerHTML = pageData.map(v => {
                const isSaved = Core.state.savedVerbs.includes(v.id);
                const isLearned = Core.state.learnedVerbs.includes(v.id);
                return `
                <div class="cl-card verb-card animate-fade ${isLearned ? 'learned' : ''}">
                    <div class="verb-header">
                        <span class="verb-v1">${v.v1}</span>
                        <span class="verb-arabic">${v.ar}</span>
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <div class="quick-stat glass" style="font-size: 0.7rem; flex: 1; justify-content: center;">V2: ${v.v2}</div>
                        <div class="quick-stat glass" style="font-size: 0.7rem; flex: 1; justify-content: center;">V3: ${v.v3}</div>
                    </div>
                    <div class="word-example" style="font-size: 0.85rem;">
                        <p class="en">"${v.ex}"</p>
                        <p class="ar" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">${v.exAr}</p>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="Core.speak('${v.v1.replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i> ${t('listen')}</button>
                        <button class="action-btn ${isSaved ? 'active' : ''}" onclick="toggleVerbSave(${v.id})"><i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}</button>
                        <button class="action-btn ${isLearned ? 'active' : ''}" style="grid-column: 1/-1;" onclick="toggleVerbLearn(${v.id})">
                            <i class="fas fa-check-circle"></i> ${isLearned ? t('unlearned') : t('learned')}
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            renderPagination(totalPages);
        }

        function renderPagination(total) {
            const container = document.getElementById('pagination');
            if (total <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= Math.min(total, 10); i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(p) {
            currentPage = p;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            applyVerbsFilters();
        }

        function toggleVerbSave(id) {
            const isSaved = Core.state.savedVerbs.includes(id);
            Core.updateProgress('savedVerbs', id, !isSaved);
            Core.showToast(isSaved ? t('toastUnsaved') : t('toastSaved'), isSaved ? 'warning' : 'success');
            updateVerbsStats();
            applyVerbsFilters();
        }

        function toggleVerbLearn(id) {
            const isLearned = Core.state.learnedVerbs.includes(id);
            Core.updateProgress('learnedVerbs', id, !isLearned);
            Core.showToast(isLearned ? t('toastUnlearned') : t('toastLearned'), isLearned ? 'warning' : 'success');
            updateVerbsStats();
            applyVerbsFilters();
        }
    </script>
</body>
</html>
