<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | الكلمات والجمل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="wordsTitle">تعلم الكلمات والجمل</h1>
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-book"></i> <span id="totalWords">0</span> <span data-i18n="totalWords">كلمة</span></div>
                    <div class="quick-stat"><i class="fas fa-check-circle"></i> <span id="learnedCount">0</span> <span data-i18n="learnedCount">مكتملة</span></div>
                    <div class="quick-stat"><i class="fas fa-bookmark"></i> <span id="savedCount">0</span> <span data-i18n="savedCount">محفوظة</span></div>
                </div>
            </div>
            <div class="header-actions">
                <div class="quick-stat glass" style="border-color: var(--warning);">
                    <i class="fas fa-fire" style="color: var(--warning);"></i>
                    <span id="streakNum">0</span> <span data-i18n="streak">يوم</span>
                </div>
            </div>
        </header>

        <!-- DAILY WORD -->
        <div class="daily-banner glass animate-fade" id="dailyBanner">
            <span class="daily-tag" data-i18n="dailyWord">كلمة اليوم</span>
            <div style="flex: 1; display: flex; align-items: center; gap: 1rem;">
                <span id="dailyWordText" class="word-text" style="font-size: 1.5rem;">—</span>
                <span id="dailyWordAr" class="word-arabic"></span>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="action-btn listen" onclick="playDaily()"><i class="fas fa-volume-up"></i> <span data-i18n="listen">استمع</span></button>
                <button class="action-btn learn-btn" onclick="learnDaily()"><i class="fas fa-check"></i> <span data-i18n="learned">تعلمتها</span></button>
            </div>
        </div>

        <!-- SEARCH & FILTERS -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search" placeholder="ابحث عن كلمة...">
        </div>

        <div class="filter-row">
            <button class="filter-chip active" data-level="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-level="beginner" data-i18n="beginner">مبتدئ</button>
            <button class="filter-chip" data-level="intermediate" data-i18n="intermediate">متوسط</button>
            <button class="filter-chip" data-level="advanced" data-i18n="advanced">متقدم</button>
            <button class="filter-chip" id="showSavedBtn"><i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظات</span></button>
            <button class="filter-chip" id="showLearnedBtn"><i class="fas fa-check-circle"></i> <span data-i18n="completed">المكتملة</span></button>
        </div>

        <!-- WORDS GRID -->
        <div class="content-grid" id="wordsGrid"></div>

        <!-- PAGINATION -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="beginner-data.js"></script>
    <script src="intermediate-data.js"></script>
    <script src="advanced-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        let currentLevel = 'all';
        let searchQuery = '';
        let currentPage = 1;
        const itemsPerPage = 24;
        let viewMode = 'all'; // all, saved, learned

        const ALL_WORDS = [...BEGINNER_WORDS, ...INTERMEDIATE_WORDS, ...ADVANCED_WORDS];

        document.addEventListener('DOMContentLoaded', () => {
            initPage();
            setupLocalListeners();
        });

        function initPage() {
            updateStats();
            renderDaily();
            applyFilters();
        }

        function setupLocalListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1;
                applyFilters();
            });

            document.querySelectorAll('.filter-chip[data-level]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    viewMode = 'all';
                    currentPage = 1;
                    applyFilters();
                });
            });

            document.getElementById('showSavedBtn').addEventListener('click', () => {
                toggleViewMode('saved', document.getElementById('showSavedBtn'));
            });

            document.getElementById('showLearnedBtn').addEventListener('click', () => {
                toggleViewMode('learned', document.getElementById('showLearnedBtn'));
            });
        }

        function toggleViewMode(mode, btn) {
            document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
            if (viewMode === mode) {
                viewMode = 'all';
                document.querySelector('.filter-chip[data-level="all"]').classList.add('active');
            } else {
                viewMode = mode;
                btn.classList.add('active');
            }
            currentPage = 1;
            applyFilters();
        }

        function updateStats() {
            document.getElementById('totalWords').textContent = ALL_WORDS.length;
            document.getElementById('learnedCount').textContent = Core.state.learnedWords.length;
            document.getElementById('savedCount').textContent = Core.state.savedWords.length;
            document.getElementById('streakNum').textContent = Core.state.streak.count;
        }

        let dailyWord = null;
        function renderDaily() {
            dailyWord = ALL_WORDS[Math.floor(Date.now() / 86400000) % ALL_WORDS.length];
            document.getElementById('dailyWordText').textContent = dailyWord.word;
            document.getElementById('dailyWordAr').textContent = dailyWord.arabic;
        }

        function playDaily() { Core.speak(dailyWord.word); }
        function learnDaily() {
            Core.updateProgress('learnedWords', dailyWord.id);
            updateStats();
            Core.showToast(t('toastLearned'), 'success');
        }

        function applyFilters() {
            let filtered = ALL_WORDS;

            if (viewMode === 'saved') {
                filtered = filtered.filter(w => Core.state.savedWords.includes(w.id));
            } else if (viewMode === 'learned') {
                filtered = filtered.filter(w => Core.state.learnedWords.includes(w.id));
            } else if (currentLevel !== 'all') {
                const data = currentLevel === 'beginner' ? BEGINNER_WORDS :
                             currentLevel === 'intermediate' ? INTERMEDIATE_WORDS : ADVANCED_WORDS;
                filtered = data;
            }

            if (searchQuery) {
                filtered = filtered.filter(w =>
                    w.word.toLowerCase().includes(searchQuery) ||
                    w.arabic.includes(searchQuery)
                );
            }

            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('wordsGrid');
            const totalPages = Math.ceil(data.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = data.slice(start, end);

            if (pageData.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <i class="fas fa-search" style="font-size: 3rem; color: var(--text-tertiary); margin-bottom: 1rem;"></i>
                    <p class="text-secondary">لم يتم العثور على نتائج</p>
                </div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            grid.innerHTML = pageData.map(w => {
                const isSaved = Core.state.savedWords.includes(w.id);
                const isLearned = Core.state.learnedWords.includes(w.id);
                return `
                <div class="cl-card word-card animate-fade ${isLearned ? 'learned' : ''}">
                    <div class="word-header">
                        <span class="word-text">${w.word}</span>
                        <span class="word-arabic">${w.arabic}</span>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-tertiary); margin-bottom: 0.5rem;"><i class="fas fa-microphone"></i> ${w.pronunciation}</p>
                    <div class="word-example">
                        <p class="en">"${w.example}"</p>
                        <p class="ar" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem;">${w.exampleArabic}</p>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="Core.speak('${w.word.replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i> ${t('listen')}</button>
                        <button class="action-btn ${isSaved ? 'active' : ''}" onclick="toggleSave(${w.id})"><i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}</button>
                        <button class="action-btn ${isLearned ? 'active' : ''}" style="grid-column: 1/-1;" onclick="toggleLearn(${w.id})">
                            <i class="fas fa-check-circle"></i> ${isLearned ? t('unlearned') : t('learned')}
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            renderPagination(totalPages);
        }

        function renderPagination(total) {
            const container = document.getElementById('pagination');
            if (total <= 1) { container.innerHTML = ''; return; }

            let html = '';
            for (let i = 1; i <= Math.min(total, 10); i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(p) {
            currentPage = p;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            applyFilters();
        }

        function toggleSave(id) {
            const isSaved = Core.state.savedWords.includes(id);
            Core.updateProgress('savedWords', id, !isSaved);
            Core.showToast(isSaved ? t('toastUnsaved') : t('toastSaved'), isSaved ? 'warning' : 'success');
            updateStats();
            applyFilters();
        }

        function toggleLearn(id) {
            const isLearned = Core.state.learnedWords.includes(id);
            Core.updateProgress('learnedWords', id, !isLearned);
            Core.showToast(isLearned ? t('toastUnlearned') : t('toastLearned'), isLearned ? 'warning' : 'success');
            updateStats();
            applyFilters();
        }
    </script>
</body>
</html>
