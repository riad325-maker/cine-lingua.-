<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | القصص القصيرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="storiesTitle">القصص القصيرة</h1>
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-book-open"></i> <span id="totalStories">0</span> <span data-i18n="statStories">قصة</span></div>
                    <div class="quick-stat"><i class="fas fa-bookmark"></i> <span id="savedCount">0</span> <span data-i18n="savedCount">محفوظة</span></div>
                </div>
            </div>
            <button class="filter-chip" id="showSavedBtn"><i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظات</span></button>
        </header>

        <!-- SEARCH & FILTERS -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search" placeholder="ابحث عن قصة...">
        </div>

        <div class="filter-row">
            <button class="filter-chip active" data-level="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-level="a1">A1</button>
            <button class="filter-chip" data-level="a2">A2</button>
            <button class="filter-chip" data-level="b1">B1</button>
            <button class="filter-chip" data-level="b2">B2</button>
            <button class="filter-chip" data-level="c1">C1</button>
            <button class="filter-chip" data-level="c2">C2</button>
        </div>

        <!-- STORIES GRID -->
        <div class="content-grid" id="storiesGrid"></div>

        <!-- PAGINATION -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- STORY MODAL -->
    <div class="cl-modal" id="storyModal">
        <div class="modal-container" id="modalContainer"></div>
    </div>

    <script src="stories-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        let currentLevel = 'all';
        let searchQuery = '';
        let currentPage = 1;
        const itemsPerPage = 6;
        let viewMode = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            applyFilters();
            setupListeners();
        });

        function setupListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1;
                applyFilters();
            });

            document.querySelectorAll('.filter-chip[data-level]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    viewMode = 'all';
                    currentPage = 1;
                    applyFilters();
                });
            });

            document.getElementById('showSavedBtn').addEventListener('click', () => {
                const btn = document.getElementById('showSavedBtn');
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                if (viewMode === 'saved') {
                    viewMode = 'all';
                    document.querySelector('.filter-chip[data-level="all"]').classList.add('active');
                } else {
                    viewMode = 'saved';
                    btn.classList.add('active');
                }
                currentPage = 1;
                applyFilters();
            });
        }

        function updateStats() {
            document.getElementById('totalStories').textContent = STORIES_DATA.length;
            document.getElementById('savedCount').textContent = Core.state.savedStories.length;
        }

        function applyFilters() {
            let filtered = STORIES_DATA;
            if (viewMode === 'saved') {
                filtered = filtered.filter(s => Core.state.savedStories.includes(s.id));
            } else if (currentLevel !== 'all') {
                filtered = filtered.filter(s => s.level === currentLevel);
            }

            if (searchQuery) {
                filtered = filtered.filter(s => s.title.toLowerCase().includes(searchQuery) || s.content.toLowerCase().includes(searchQuery));
            }

            renderGrid(filtered);
        }

        function renderGrid(data) {
            const grid = document.getElementById('storiesGrid');
            const totalPages = Math.ceil(data.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const pageData = data.slice(start, start + itemsPerPage);

            if (pageData.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <i class="fas fa-book-open" style="font-size: 3rem; color: var(--text-tertiary); margin-bottom: 1rem;"></i>
                    <p class="text-secondary">لا توجد قصص محفوظة حالياً</p>
                </div>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            grid.innerHTML = pageData.map(s => `
                <div class="cl-card story-card animate-fade">
                    <div class="story-img-wrap">
                        <img src="${s.image}" alt="${s.title}" loading="lazy">
                        <span style="position: absolute; top: 1rem; right: 1rem;" class="quick-stat glass">${s.difficulty}</span>
                    </div>
                    <div class="story-body">
                        <h3 class="word-text" style="font-size: 1.2rem; margin-bottom: 0.5rem;">${s.title}</h3>
                        <p class="text-secondary" style="font-size: 0.85rem; height: 3rem; overflow: hidden;">${s.content.substring(0, 100)}...</p>
                        <div class="story-footer" style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                            <span class="text-tertiary" style="font-size: 0.8rem;"><i class="fas fa-clock"></i> ${s.level.toUpperCase()}</span>
                            <button class="btn btn-white" style="padding: 0.4rem 1rem; border: 1px solid var(--primary);" onclick="openStory(${s.id})">
                                <span data-i18n="learnMore">اقرأ</span> <i class="fas fa-arrow-left"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            renderPagination(totalPages);
        }

        function renderPagination(total) {
            const container = document.getElementById('pagination');
            if (total <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= total; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function goToPage(p) {
            currentPage = p;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            applyFilters();
        }

        function openStory(id) {
            const s = STORIES_DATA.find(x => x.id === id);
            const isSaved = Core.state.savedStories.includes(s.id);
            const container = document.getElementById('modalContainer');

            container.innerHTML = `
                <div class="modal-header">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <button class="settings-close" style="background: var(--bg-secondary); color: var(--text-primary);" onclick="closeStory()"><i class="fas fa-times"></i></button>
                        <h2 class="word-text" style="font-size: 1.5rem;">${s.title}</h2>
                    </div>
                    <button class="action-btn ${isSaved ? 'active' : ''}" onclick="toggleSave(${s.id})">
                        <i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}
                    </button>
                </div>
                <div class="story-content animate-fade">
                    <img src="${s.image}" style="width: 100%; height: 300px; object-fit: cover; border-radius: var(--radius-lg); margin-bottom: 2rem;">
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                        <button class="action-btn" onclick="Core.speak(\`${s.content.replace(/`/g, "'")}\`)"><i class="fas fa-play"></i> ${t('listen')}</button>
                        <button class="action-btn" onclick="Core.speak(\`${s.content.replace(/`/g, "'")}\`, 'en-US', 0.6)"><i class="fas fa-walking"></i> ${t('slow')}</button>
                    </div>
                    <div class="word-example" style="font-size: 1.1rem; line-height: 2;">
                        <p class="en">${s.content}</p>
                    </div>
                    <button class="btn btn-outline-white" style="color: var(--primary); border-color: var(--primary); margin-bottom: 1rem;" onclick="document.getElementById('arTranslation').classList.toggle('show')">
                        <i class="fas fa-language"></i> <span data-i18n="showTranslation">الترجمة</span>
                    </button>
                    <div id="arTranslation" class="modal-translation" style="display:none; padding: 1.5rem; background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: 2rem;">
                        <p>${s.arabic}</p>
                    </div>
                </div>
            `;

            document.getElementById('storyModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            // Re-apply translations for the new content
            Core.injectComponents(); // refresh any icons or shared components if needed
            applyLanguage(currentLanguage);

            // Quick fix for the toggle
            const trans = document.getElementById('arTranslation');
            const observer = new MutationObserver(() => {
                trans.style.display = trans.classList.contains('show') ? 'block' : 'none';
            });
            observer.observe(trans, { attributes: true, attributeFilter: ['class'] });
        }

        function closeStory() {
            document.getElementById('storyModal').classList.remove('active');
            document.body.style.overflow = '';
            window.speechSynthesis.cancel();
        }

        function toggleSave(id) {
            const isSaved = Core.state.savedStories.includes(id);
            Core.updateProgress('savedStories', id, !isSaved);
            Core.showToast(isSaved ? t('toastUnsaved') : t('toastSaved'), isSaved ? 'warning' : 'success');
            updateStats();
            // Update the button in modal if it's open
            const btn = document.querySelector('.modal-header .action-btn');
            if (btn) {
                btn.classList.toggle('active', !isSaved);
                btn.innerHTML = `<i class="fas fa-bookmark"></i> ${!isSaved ? t('unsave') : t('save')}`;
            }
            applyFilters();
        }
    </script>
</body>
</html>
