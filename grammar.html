<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineLingua | قواعد الجرامر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- PAGE HEADER -->
        <header class="page-header">
            <div class="page-title-group">
                <h1 data-i18n="grammarTitle">قواعد الجرامر</h1>
                <div class="quick-stats">
                    <div class="quick-stat"><i class="fas fa-book"></i> <span id="totalRules">0</span> <span data-i18n="grammar">قاعدة</span></div>
                    <div class="quick-stat"><i class="fas fa-check-circle"></i> <span id="learnedRulesCount">0</span> <span data-i18n="completed">مكتملة</span></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="filter-chip" id="showSavedBtn"><i class="fas fa-bookmark"></i> <span data-i18n="saved">المحفوظات</span></button>
            </div>
        </header>

        <!-- SEARCH & FILTERS -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search" placeholder="ابحث عن قاعدة...">
        </div>

        <div class="filter-row">
            <button class="filter-chip active" data-level="all" data-i18n="all">الكل</button>
            <button class="filter-chip" data-level="مبتدئ" data-i18n="beginner">مبتدئ</button>
            <button class="filter-chip" data-level="متوسط" data-i18n="intermediate">متوسط</button>
            <button class="filter-chip" data-level="متقدم" data-i18n="advanced">متقدم</button>
        </div>

        <!-- GRID -->
        <div class="content-grid" id="grammarGrid"></div>
    </div>

    <script src="grammar-data.js"></script>
    <script src="translation.js"></script>
    <script src="core.js"></script>

    <script>
        let currentLevel = 'all';
        let searchQuery = '';
        let viewMode = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            initGrammar();
            setupGrammarListeners();
        });

        function initGrammar() {
            updateGrammarStats();
            applyGrammarFilters();
        }

        function setupGrammarListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                applyGrammarFilters();
            });

            document.querySelectorAll('.filter-chip[data-level]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    viewMode = 'all';
                    applyGrammarFilters();
                });
            });

            document.getElementById('showSavedBtn').addEventListener('click', () => {
                const btn = document.getElementById('showSavedBtn');
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                if (viewMode === 'saved') {
                    viewMode = 'all';
                    document.querySelector('.filter-chip[data-level="all"]').classList.add('active');
                } else {
                    viewMode = 'saved';
                    btn.classList.add('active');
                }
                applyGrammarFilters();
            });
        }

        function updateGrammarStats() {
            document.getElementById('totalRules').textContent = GRAMMAR_DATA.length;
            document.getElementById('learnedRulesCount').textContent = Core.state.learnedRules.length;
        }

        function applyGrammarFilters() {
            let filtered = GRAMMAR_DATA;
            if (viewMode === 'saved') {
                filtered = filtered.filter(g => Core.state.savedRules.includes(g.id));
            } else if (currentLevel !== 'all') {
                filtered = filtered.filter(g => g.tags.includes(currentLevel));
            }

            if (searchQuery) {
                filtered = filtered.filter(g => g.title.toLowerCase().includes(searchQuery) || g.sub.toLowerCase().includes(searchQuery));
            }

            renderGrammarGrid(filtered);
        }

        function renderGrammarGrid(data) {
            const grid = document.getElementById('grammarGrid');
            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <i class="fas fa-search" style="font-size: 3rem; color: var(--text-tertiary); margin-bottom: 1rem;"></i>
                    <p class="text-secondary">لا توجد نتائج</p>
                </div>`;
                return;
            }

            grid.innerHTML = data.map(g => {
                const isSaved = Core.state.savedRules.includes(g.id);
                const isLearned = Core.state.learnedRules.includes(g.id);
                return `
                <div class="cl-card grammar-card animate-fade ${isLearned ? 'learned' : ''}">
                    <div class="card-strip" style="background: ${g.color};"></div>
                    <div class="card-header">
                        <div class="card-title-group">
                            <h3 class="card-title" style="color: ${g.color}; font-size: 1.4rem;">${g.title}</h3>
                            <p class="card-sub">${g.sub}</p>
                        </div>
                    </div>
                    <div class="card-formula">${g.formula}</div>
                    <p class="card-rule">${g.rule}</p>
                    <div class="examples-list">
                        ${g.examples.slice(0, 2).map(ex => `
                            <div class="example-item">
                                <p class="ex-en">"${ex.en}"</p>
                                <p class="ex-ar">${ex.ar}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="Core.speak('${g.title.replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i> ${t('listen')}</button>
                        <button class="action-btn ${isSaved ? 'active' : ''}" onclick="toggleGrammarSave(${g.id})"><i class="fas fa-bookmark"></i> ${isSaved ? t('unsave') : t('save')}</button>
                        <button class="action-btn ${isLearned ? 'active' : ''}" style="grid-column: 1/-1;" onclick="toggleGrammarLearn(${g.id})">
                            <i class="fas fa-check-circle"></i> ${isLearned ? t('unlearned') : t('learned')}
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleGrammarSave(id) {
            const isSaved = Core.state.savedRules.includes(id);
            Core.updateProgress('savedRules', id, !isSaved);
            Core.showToast(isSaved ? t('toastUnsaved') : t('toastSaved'), isSaved ? 'warning' : 'success');
            updateGrammarStats();
            applyGrammarFilters();
        }

        function toggleGrammarLearn(id) {
            const isLearned = Core.state.learnedRules.includes(id);
            Core.updateProgress('learnedRules', id, !isLearned);
            Core.showToast(isLearned ? t('toastUnlearned') : t('toastLearned'), isLearned ? 'warning' : 'success');
            updateGrammarStats();
            applyGrammarFilters();
        }
    </script>
</body>
</html>
